<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💜</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#0f051d,#1b0033,#3a0066,#ff00cc);
background-size:400% 400%;
animation:bgMove 10s infinite alternate;
text-align:center;
color:white;
overflow-x:hidden;
animation:pageEnter 1.5s ease;
}

@keyframes bgMove{
0%{background-position:left}
100%{background-position:right}
}

@keyframes pageEnter{
from{
opacity:0;
transform:scale(0.9);
}
to{
opacity:1;
transform:scale(1);
}
}

h1{
margin-top:30px;
font-size:45px;
color:#ff9cf7;
text-shadow:0 0 20px #ff00cc;
}

.container{
width:80%;
margin:auto;
margin-top:30px;
padding:30px;

background:rgba(255,255,255,0.08);
border-radius:25px;

backdrop-filter:blur(15px);

box-shadow:
0 0 20px #ff00cc,
0 0 40px #7b00ff;
}

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
margin-top:25px;
}

.gallery img{
width:100%;
aspect-ratio:3/4;
object-fit:cover;
border-radius:18px;
transition:0.4s;

box-shadow:
0 0 10px #ff00cc,
0 0 25px #7b00ff;
}

.gallery img:hover{
transform:scale(1.08);
box-shadow:
0 0 25px #ff00cc,
0 0 40px #7b00ff;
}

.buttons{
margin-top:35px;
position:relative;
height:100px;
}

button{
padding:15px 40px;
font-size:18px;
border:none;
border-radius:40px;
cursor:pointer;
margin:10px;
}

#yes{
background:linear-gradient(45deg,#ff00cc,#7b00ff);
color:white;
box-shadow:0 0 15px #ff00cc;
}

#yes:hover{
transform:scale(1.1);
box-shadow:
0 0 20px #ff00cc,
0 0 40px #7b00ff,
0 0 60px #ff00cc;
}

#no{
background:black;
color:white;
position:absolute;
}

#animasi{
display:none;
font-size:40px;
margin-top:20px;
animation:pop 1s infinite alternate;
}

@keyframes pop{
from{transform:scale(1)}
to{transform:scale(1.2)}
}

.heart{
position:fixed;
bottom:-20px;
color:#ff4df0;
font-size:25px;
animation:float 5s linear forwards;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-100vh)}
}

</style>
</head>

<body>

<audio id="bgMusic" loop>
<source src="sound/baby.mp4" type="audio/mp4">
</audio>

<script>
const music = document.getElementById("bgMusic");

document.addEventListener("click", function(){
    music.play();
}, { once: true });
</script>

<!-- SUARA YES -->
<audio id="yesSound">
<source src="sound/celebration.mp3" type="audio/mpeg">
</audio>

<h1>💜 Do You Want To Be Mine? 💜</h1>
<h1>💜 Rani Pradiyanti 💜</h1>

<div class="container">

<div class="gallery">

<img src="foto/foto1.jpg">
<img src="foto/foto2.jpg">
<img src="foto/foto3.jpg">

</div>

<div class="buttons">

<button id="yes">YES 💗</button>
<button id="no">NO 😢</button>

</div>

<div id="animasi">💜 YAAAY 💜</div>

</div>

<script>

/* autoplay musik */
window.addEventListener("load", function(){

const music = document.getElementById("bgMusic");

music.muted = false;
music.volume = 0.5;

music.play().catch(function(e){
console.log("Autoplay diblokir browser", e);
});

});


/* tombol NO kabur */

const noBtn=document.getElementById("no");

noBtn.addEventListener("mouseover",function(){

let x=Math.random()*300-150;
let y=Math.random()*200-100;

noBtn.style.transform=`translate(${x}px,${y}px)`;

});


/* klik YES */

document.getElementById("yes").onclick=function(){

const music=document.getElementById("bgMusic");
const sound=document.getElementById("yesSound");

music.pause();

sound.currentTime=0;
sound.play();

document.getElementById("animasi").style.display="block";

/* animasi hati */

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.innerHTML="💜💗";
heart.className="heart";
heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

}

setTimeout(function(){

window.location.href="success.html";

},3000);

}

</script>

</body>
</html>
