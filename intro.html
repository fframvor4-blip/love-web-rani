<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pesan Untukmu</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f051d,#2d0066,#ff00cc);
background-size:400% 400%;
animation:bg 10s infinite alternate;
font-family:'Poppins',sans-serif;
color:white;
text-align:center;
}

@keyframes bg{
0%{background-position:left}
100%{background-position:right}
}

.container{
padding:50px 70px;
background:rgba(255,255,255,0.08);
border-radius:20px;
backdrop-filter:blur(15px);

box-shadow:
0 0 20px #ff00cc,
0 0 40px #7b00ff;
}

/* teks */

#text{
font-size:48px;
font-family:'Dancing Script',cursive;
color:#ffd6ff;

text-shadow:
0 0 10px #ff00cc,
0 0 20px #ff00cc,
0 0 40px #7b00ff;

transition:1s;
}

/* tombol mulai */

#startBtn{

margin-top:40px;
padding:15px 40px;

font-size:18px;

border:none;
border-radius:40px;

cursor:pointer;

background:linear-gradient(45deg,#ff00cc,#7b00ff);
color:white;

box-shadow:
0 0 15px #ff00cc,
0 0 30px #7b00ff;

transition:0.3s;

}

#startBtn:hover{

transform:scale(1.1);

box-shadow:
0 0 25px #ff00cc,
0 0 45px #7b00ff;

}

.fadeOut{
animation:fadeOut 1.2s forwards;
}

@keyframes fadeOut{
from{
opacity:1;
transform:scale(1);
}
to{
opacity:0;
transform:scale(1.2);
}
}

</style>
</head>

<body>
<audio id="bgMusic" loop>
<source src="sound/kota.mp4" type="audio/mp4">
</audio>

<script>
const music = document.getElementById("bgMusic");

document.addEventListener("click", function(){
    music.play();
}, { once: true });
</script>

<div class="container">

<div id="text">
FOR RANI PRADIYANTI
</div>

<button id="startBtn">💜 Klik Disini 💜</button>

</div>

<script>

const messages=[
"3...",
"2...",
"1...",
"Allo Rani yang Cantik",
"arrggghhhhhhhhhh",
"reti ra.. capekkk banget gawe web iki",
"yaa walaupun dibantu AI sii wkwkw",
"ohh iyo rep ngomong",
"Biar kata sayang menjadi BPOM",
"Dan Sesuai janji sebelumnya",
"Dengan kata-kata...",
"BAR BODHO wkwkw",
"JADII...",
"💜RANI PRADIYANTI💜",
"💜💜💜DO YOU WANT TO BE MINE?💜💜💜"
];

let index=0;
let running=false;

function changeText(){

if(!running) return;

const text=document.getElementById("text");

text.style.opacity=0;

setTimeout(()=>{

text.innerHTML=messages[index];

text.style.opacity=1;

index++;

if(index>=messages.length){

setTimeout(()=>{

document.body.classList.add("fadeOut");

setTimeout(function(){
window.location.href="data.html";
},1200);

},2000);

}

},800);

}

document.getElementById("startBtn").onclick=function(){

running=true;

this.style.display="none";

setInterval(changeText,3000);

};

</script>

</body>
</html>
